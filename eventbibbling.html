<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event bubbling</title>
    <style>
        .child{
            background-color: aliceblue;
            border: 2px solid black;
            padding: 14px;
            margin: 14px;
            cursor: pointer;
        }
        .childcontainer{
            background-color: beige;
            padding: 14px;
            margin: 14px;
        }
         .container{
            background-color: rgb(219, 219, 25);
            padding: 14px;
            margin: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="childcontainer">
            <div class="child">
                I am a child
            </div>

        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click",(e)=> {
            e.stopPropagation()
            alert("child was clinked")
        })

        document.querySelector(".childcontainer").addEventListener("click",(e)=> {
             e.stopPropagation()
            alert("childcontainer was clinked")
        })

        document.querySelector(".container").addEventListener("click",()=> {
            alert("container was clinked")
        })

        function  getRandomColor() {
            let val1 =Math.ceil(110 + Math.random()*255);
            let val2 =Math.ceil(100 + Math.random()*255);
            let val3 =Math.ceil(130 + Math.random()*255);
            return `rgb(${val1},${val2},${val3})`
        }
    //    let a = setInterval(() => {
    //         document.querySelector(".childcontainer").style.background = getRandomColor(); 
    //         // document.querySelector(".child").style.background = getRandomColor();
    //         // document.querySelector(".container").style.background = getRandomColor();
    //     }, 1000);
    //     console.log(a)
          setTimeout(() => {
            document.querySelector(".childcontainer").style.background = getRandomColor(); 
            // document.querySelector(".child").style.background = getRandomColor();
            // document.querySelector(".container").style.background = getRandomColor();
        }, 2000);
        // console.log(a)
    </script>
</body>

</html>
